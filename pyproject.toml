[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes; E402/E501 excluded to avoid touching working code
select = ["E", "F"]
ignore = ["E402", "E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
# Do not check bodies of functions that have no type annotations at all
check_untyped_defs = false
warn_return_any = false
warn_unused_ignores = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
